name: Build & Deploy (World Cup Predictor)

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *" # רענון אוטומטי כל 6 שעות במהלך המונדיאל
  workflow_dispatch: {} # אפשרות להריץ ידנית מ-GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # שומר: אחרי הגמר (20.7.2026) ריצות מתוזמנות נעצרות מעצמן.
  # push ידני / הרצה ידנית תמיד ירוצו.
  guard:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%Y%m%d)" -gt "20260720" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "המונדיאל הסתיים — מדלג על העדכון המתוזמן."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  build-deploy:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Generate predictions (data.json)
        working-directory: backend
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python generate_static.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
