<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#20222f"/>
      <stop offset="55%" stop-color="#0f1019"/>
      <stop offset="100%" stop-color="#06070e"/>
    </radialGradient>
    <linearGradient id="gold" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="32%" stop-color="#eac866"/>
      <stop offset="64%" stop-color="#c89a34"/>
      <stop offset="100%" stop-color="#956f1f"/>
    </linearGradient>
    <linearGradient id="goldHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8da"/>
      <stop offset="100%" stop-color="#e6b94c"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d2aa44"/>
      <stop offset="100%" stop-color="#7c5c16"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <ellipse cx="256" cy="160" rx="160" ry="170" fill="#eac866" opacity="0.08"/>

  <!-- slender flowing body (left half + lighter right half = the twist) -->
  <path d="M256 200
           C224 200 210 250 220 312
           C206 356 206 404 232 430
           L256 436 Z" fill="url(#gold)"/>
  <path d="M256 200
           C288 200 302 250 292 312
           C306 356 306 404 280 430
           L256 436 Z" fill="url(#goldHi)" opacity="0.92"/>
  <path d="M256 206 C249 280 249 360 256 430 C263 360 263 280 256 206 Z"
        fill="#8a6418" opacity="0.4"/>

  <!-- globe on top -->
  <circle cx="256" cy="146" r="62" fill="url(#gold)"/>
  <ellipse cx="234" cy="126" rx="22" ry="17" fill="#fff7d2" opacity="0.6"/>
  <path d="M200 146 q56 28 112 0" stroke="#9b7320" stroke-width="3" fill="none" opacity="0.45"/>
  <path d="M256 86 q-24 60 0 120" stroke="#9b7320" stroke-width="3" fill="none" opacity="0.35"/>

  <!-- distinct trophy base -->
  <path d="M214 432 q42 16 84 0 l10 22 q-52 16 -104 0 Z" fill="url(#base)"/>
  <rect x="196" y="462" width="120" height="20" rx="6" fill="url(#base)"/>
  <rect x="182" y="486" width="148" height="22" rx="9" fill="url(#base)"/>
</svg>
